<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Popup Translator Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="pt-settings">
      <header class="pt-settings__header">
        <h1>Popup Translator</h1>
        <p class="pt-settings__hint">Translate any text on hover.</p>
      </header>

      <section class="pt-settings__row">
        <label for="pt-sl">Translate From</label>
        <select id="pt-sl"></select>
      </section>

      <section class="pt-settings__row pt-settings__info">
        <label>Translate Into</label>
        <span class="pt-settings__value">Vietnamese</span>
      </section>

      <section class="pt-settings__row pt-settings__row--toggle">
        <label for="pt-hover">Enable hover translation</label>
        <input type="checkbox" id="pt-hover" />
      </section>

      <section class="pt-settings__row pt-settings__row--toggle">
        <label for="pt-dblclick">Double-click to look up dictionary</label>
        <input type="checkbox" id="pt-dblclick" />
      </section>

      <section class="pt-settings__row pt-settings__row--toggle">
        <label for="pt-selection">Translate selected text</label>
        <input type="checkbox" id="pt-selection" />
      </section>

      <section class="pt-settings__row">
        <label for="pt-theme">Popup theme</label>
        <select id="pt-theme">
          <option value="system">Follow system</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </section>

      <footer class="pt-settings__footer">
        <span id="pt-status" class="pt-settings__status">Saved</span>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
